version: "3.8"

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_HOST=0.0.0.0
    volumes:
      - phoenix_data:/.phoenix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PHOENIX_HOST=http://phoenix:6006
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      phoenix:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  phoenix_data:
